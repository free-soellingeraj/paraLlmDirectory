version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /etc
  read_write:
    - /sandbox
    - /tmp
    - /home

process:
  run_as_user: sandbox
  run_as_group: sandbox

landlock:
  compatibility: best_effort

network_policies:
  anthropic_api:
    name: anthropic-api
    endpoints:
      - host: api.anthropic.com
        port: 443
      - host: "*.anthropic.com"
        port: 443
    binaries:
      - path: "**"

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
      - host: github.com
        port: 22
      - host: "*.github.com"
        port: 443
      - host: "*.githubusercontent.com"
        port: 443
    binaries:
      - path: "**"

  npm_registry:
    name: npm-registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
      - host: "*.npmjs.org"
        port: 443
    binaries:
      - path: "**"

  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
      - host: files.pythonhosted.org
        port: 443
    binaries:
      - path: "**"

  docker_hub:
    name: docker-hub
    endpoints:
      - host: "*.docker.io"
        port: 443
      - host: "*.docker.com"
        port: 443
    binaries:
      - path: "**"

  general_https:
    name: general-https
    endpoints:
      - host: "*"
        port: 443
        enforcement: audit
    binaries:
      - path: "**"
